// ─── RENDER ─────────────────────────────────────────────────────────────────
function getCompliment(i) {
  return C[i][lang];
}

function splitWords(text, caps) {
  const t = caps ? text.toUpperCase() : text;
  // split into lines of max ~12 chars
  const words = t.split(' ');
  const lines = [];
  let cur = '';
  for (const w of words) {
    if (!cur) { cur = w; continue; }
    if ((cur + ' ' + w).length <= 13) { cur += ' ' + w; }
    else { lines.push(cur); cur = w; }
  }
  if (cur) lines.push(cur);
  return lines;
}

function renderCard(idx, cardDef) {
  const text = getCompliment(idx);
  const {bg, fg, accent, layout, caps} = cardDef;
  const stage = document.getElementById('stage');
  stage.style.backgroundColor = bg;

  const card = document.getElementById('card');

  // Font size driven by text length — short = big, long = smaller, always readable
  const len = text.length;
  let fs;
  if (len <= 10)       fs = 90;
  else if (len <= 18)  fs = 76;
  else if (len <= 28)  fs = 62;
  else if (len <= 42)  fs = 48;
  else if (len <= 60)  fs = 36;
  else if (len <= 85)  fs = 26;
  else                 fs = 20;

  const lines = splitWords(text, caps);
  // Many lines → scale down further
  if (lines.length >= 5) fs = Math.max(fs - 8, 18);
  if (lines.length >= 7) fs = Math.max(fs - 6, 16);

  let html = '';

  if (layout === 'titan') {
    // Giant centered text
    html = `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:20px;">
      <div style="text-align:center;">
        ${lines.map((l,i) => `<div style="font-size:${fs}px;font-weight:900;color:${i===lines.length-1&&lines.length>1?accent:fg};line-height:0.88;letter-spacing:-0.04em;text-transform:${caps?'uppercase':'none'}">${l}</div>`).join('')}
      </div>
    </div>`;

  } else if (layout === 'editorial') {
    html = `<div style="width:100%;height:100%;display:flex;flex-direction:column;justify-content:flex-end;padding:clamp(24px,6vw,56px);">
      <div style="font-size:11px;font-weight:700;letter-spacing:0.2em;color:${accent};opacity:0.6;text-transform:uppercase;margin-bottom:16px;">Für dich</div>
      ${lines.map(l => `<div style="font-size:${fs}px;font-weight:800;color:${fg};line-height:1.05;letter-spacing:-0.02em;">${l}</div>`).join('')}
    </div>`;

  } else if (layout === 'b') {
    html = `<div style="width:100%;height:100%;display:flex;flex-direction:column;justify-content:flex-end;padding:clamp(24px,6vw,56px);">
      <div style="height:3px;background:${accent};width:35%;margin-bottom:20px;"></div>
      ${lines.map(l => `<div style="font-size:${fs}px;font-weight:900;color:${fg};line-height:1.0;letter-spacing:-0.02em;text-transform:${caps?'uppercase':'none'};">${l}</div>`).join('')}
    </div>`;

  } else if (layout === 'd') {
    // Staggered / treppe
    html = `<div style="width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;">
      ${lines.map((l,i) => `<div style="font-size:${fs}px;font-weight:900;color:${i%2===1?accent:fg};line-height:0.9;letter-spacing:-0.03em;text-transform:${caps?'uppercase':'none'};padding-left:${i%2===0?'6vw':'18vw'};">${l}</div>`).join('')}
    </div>`;

  } else if (layout === 'e3') {
    html = `<div style="width:100%;height:100%;display:flex;flex-direction:column;justify-content:flex-end;padding:clamp(20px,5vw,48px);">
      ${lines.map(l => `<div style="font-size:${fs}px;font-weight:900;color:${fg};line-height:1.0;letter-spacing:-0.01em;text-transform:uppercase;">${l}</div>`).join('')}
    </div>`;

  } else if (layout === 'e4') {
    html = `<div style="width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;padding:clamp(24px,6vw,56px);">
      ${lines.map((l,i) => `<div style="font-size:${fs}px;font-weight:${i===0?400:800};color:${i===lines.length-1?accent:fg};line-height:1.1;letter-spacing:-0.02em;">${l}</div>`).join('')}
    </div>`;

  } else if (layout === 'f') {
    html = `<div style="width:100%;height:100%;display:flex;flex-direction:column;justify-content:flex-start;align-items:flex-end;padding:clamp(24px,6vw,56px);">
      ${lines.map((l,i) => `<div style="font-size:${fs}px;font-weight:800;color:${i===lines.length-1?accent:fg};line-height:1.05;letter-spacing:-0.02em;text-align:right;text-transform:${caps?'uppercase':'none'};">${l}</div>`).join('')}
    </div>`;

  } else if (layout === 'h') {
    html = `<div style="width:100%;height:100%;display:flex;align-items:flex-end;justify-content:flex-start;padding:clamp(24px,6vw,56px);">
      <div style="max-width:75%;">
        ${lines.map(l => `<div style="font-size:${fs}px;font-weight:400;color:${fg};line-height:1.6;letter-spacing:0.02em;">${l}</div>`).join('')}
      </div>
    </div>`;

  } else if (layout === 'i') {
    // Split screen
    const mid = Math.ceil(lines.length/2);
    const top = lines.slice(0,mid);
    const bot = lines.slice(mid);
    html = `<div style="width:100%;height:100%;display:grid;grid-template-rows:1fr 1fr;">
      <div style="background:${accent};display:flex;align-items:center;justify-content:center;padding:16px;">
        ${top.map(l => `<div style="font-size:${fs}px;font-weight:900;color:${bg};line-height:0.9;letter-spacing:-0.03em;text-transform:uppercase;text-align:center;">${l}</div>`).join('')}
      </div>
      <div style="display:flex;align-items:center;justify-content:center;padding:16px;">
        ${bot.map(l => `<div style="font-size:${fs}px;font-weight:900;color:${fg};line-height:0.9;letter-spacing:-0.03em;text-transform:uppercase;text-align:center;">${l}</div>`).join('')}
      </div>
    </div>`;

  } else if (layout === 'j') {
    html = `<div style="width:100%;height:100%;display:flex;align-items:center;padding:clamp(20px,5vw,48px);">
      <div style="font-size:${Math.min(fs,18)}px;font-weight:900;color:${fg};text-transform:uppercase;letter-spacing:0.18em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${lines.join(' ')}</div>
    </div>`;

  } else if (layout === 'k') {
    html = `<div style="width:100%;height:100%;display:flex;flex-direction:column;justify-content:flex-end;padding:clamp(24px,6vw,56px);">
      ${lines.map((l,i) => `<div style="font-size:${fs}px;font-weight:900;color:${i===lines.length-1?accent:fg};line-height:0.92;letter-spacing:-0.03em;text-transform:${caps?'uppercase':'none'};">${l}</div>`).join('')}
    </div>`;

  } else if (layout === 'm') {
    // Massive type nearly bleeding off screen
    html = `<div style="width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;overflow:hidden;">
      ${lines.map((l,i) => `<div style="font-size:${fs+i*4}px;font-weight:900;color:${i%2===0?fg:accent};line-height:0.82;letter-spacing:-0.06em;text-transform:uppercase;white-space:nowrap;margin-left:-2px;">${l}</div>`).join('')}
    </div>`;

  } else if (layout === 'n') {
    // Poster – big lines + small contrast text
    const smallText = lines.length > 2 ? lines.pop() : null;
    html = `<div style="width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;padding:8px 12px;">
      ${lines.map((l,i) => `<div style="font-size:${fs}px;font-weight:900;color:${i===lines.length-1&&lines.length>1?accent:fg};line-height:0.86;letter-spacing:-0.05em;text-transform:uppercase;">${l}</div>`).join('')}
      ${smallText ? `<div style="font-size:13px;font-weight:400;color:${fg};opacity:0.45;margin-top:12px;letter-spacing:0.05em;">${smallText}</div>` : ''}
    </div>`;

  } else if (layout === 'o') {
    // Stacked words full width
    html = `<div style="width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;padding:8px 10px;">
      ${lines.map((l,i) => `<div style="font-size:${fs}px;font-weight:900;color:${i===lines.length-1?accent:fg};line-height:0.88;letter-spacing:-0.04em;text-transform:uppercase;">${l}</div>`).join('')}
    </div>`;
  }

  card.innerHTML = html;
}

// ─── STATE ───────────────────────────────────────────────────────────────────
let order = [...Array(100).keys()];
// shuffle
for (let i = order.length-1; i>0; i--) {
  const j = Math.floor(Math.random()*(i+1));
  [order[i],order[j]] = [order[j],order[i]];
}
let pos = 0;
let transitioning = false;

function showCurrent(animate) {
  const idx = order[pos];
  const cardDef = CARDS[pos % CARDS.length];
  if (!animate) {
    renderCard(idx, cardDef);
    return;
  }
  const card = document.getElementById('card');
  card.classList.add('out');
  setTimeout(() => {
    renderCard(idx, cardDef);
    card.classList.remove('out');
    transitioning = false;
  }, 300);
}

// Initial
showCurrent(false);

// Update counter
function updateCounter() {
  document.getElementById('counter').textContent = (pos+1) + ' / 100';
}
updateCounter();

// Show hint after 2s
setTimeout(() => document.getElementById('tap-hint').classList.add('visible'), 2000);
setTimeout(() => document.getElementById('tap-hint').classList.remove('visible'), 5000);

document.getElementById('stage').addEventListener('click', () => {
  if (transitioning) return;
  transitioning = true;
  pos = (pos + 1) % 100;
  if (pos === 0) {
    // reshuffle
    for (let i = order.length-1; i>0; i--) {
      const j = Math.floor(Math.random()*(i+1));
      [order[i],order[j]] = [order[j],order[i]];
    }
  }
  updateCounter();
  showCurrent(true);
});
</script>
<script>if("serviceWorker"in navigator)navigator.serviceWorker.register("sw.js");</script>
